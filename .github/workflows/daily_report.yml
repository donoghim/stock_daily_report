name: Daily US Stock Report

on:
  schedule:
    # 매일 UTC 21:30 실행 (한국시간 오전 6:30)
    - cron: '30 21 * * *'
  workflow_dispatch:
    # 수동 실행 지원

jobs:
  run-daily-report:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 시스템 의존성 설치 (wkhtmltopdf 등)
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf fontconfig
        # 한글 폰트 설치 (PDF 깨짐 방지)
        sudo apt-get install -y fonts-nanum*
        fc-cache -fv

    - name: 파이썬 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 시황 보고서 스크립트 실행
      env:
        # Repository Settings -> Secrets and variables -> Actions 에 등록해야 할 변수들
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: |
        python main.py
